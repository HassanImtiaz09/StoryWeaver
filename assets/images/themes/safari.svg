<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="safariSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e67e22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="safariVignette" cx="50%" cy="35%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.4" />
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="390" height="844" fill="url(#safariSky)"/>

  <!-- Sun -->
  <circle cx="320" cy="80" r="55" fill="#FFD700" opacity="0.65"/>
  <circle cx="320" cy="80" r="52" fill="#f39c12" opacity="0.35"/>

  <!-- Sun rays -->
  <line x1="320" y1="10" x2="320" y2="-10" stroke="#FFD700" stroke-width="3" opacity="0.25"/>
  <line x1="390" y1="80" x2="410" y2="80" stroke="#FFD700" stroke-width="3" opacity="0.25"/>
  <line x1="372" y1="28" x2="388" y2="12" stroke="#FFD700" stroke-width="3" opacity="0.25"/>
  <line x1="372" y1="132" x2="388" y2="148" stroke="#FFD700" stroke-width="3" opacity="0.25"/>

  <!-- Clouds -->
  <circle cx="60" cy="150" r="35" fill="#e74c3c" opacity="0.2"/>
  <circle cx="95" cy="140" r="40" fill="#e74c3c" opacity="0.18"/>
  <circle cx="75" cy="170" r="30" fill="#e74c3c" opacity="0.16"/>

  <!-- Acacia tree silhouettes (background) -->
  <g opacity="0.28">
    <!-- Trunk -->
    <rect x="95" y="400" width="10" height="200" fill="#8B4513"/>
    <!-- Crown -->
    <circle cx="100" cy="380" r="60" fill="#7d6608"/>
    <circle cx="70" cy="390" r="45" fill="#7d6608"/>
    <circle cx="130" cy="390" r="50" fill="#7d6608"/>
  </g>

  <g opacity="0.32">
    <!-- Trunk -->
    <rect x="280" y="420" width="12" height="180" fill="#8B4513"/>
    <!-- Crown -->
    <circle cx="286" cy="395" r="70" fill="#7d6608"/>
    <circle cx="245" cy="410" r="50" fill="#7d6608"/>
    <circle cx="327" cy="410" r="55" fill="#7d6608"/>
  </g>

  <!-- Smaller trees/shrubs -->
  <g opacity="0.25">
    <rect x="200" y="520" width="8" height="120" fill="#654321"/>
    <circle cx="204" cy="505" r="35" fill="#7d6608"/>
  </g>

  <g opacity="0.22">
    <rect x="350" y="550" width="8" height="100" fill="#654321"/>
    <circle cx="354" cy="535" r="32" fill="#7d6608"/>
  </g>

  <!-- Grass at bottom -->
  <rect x="0" y="700" width="390" height="144" fill="#d68910" opacity="0.35"/>
  <rect x="0" y="730" width="390" height="114" fill="#9d5d0c" opacity="0.25"/>

  <!-- Animal silhouettes -->
  <!-- Giraffe -->
  <g opacity="0.3">
    <circle cx="120" cy="620" r="18" fill="#5C4033"/>
    <rect x="115" y="640" width="10" height="80" fill="#5C4033" opacity="0.9"/>
    <rect x="128" y="640" width="9" height="80" fill="#5C4033" opacity="0.9"/>
    <!-- Neck -->
    <polygon points="115,615 112,550 128,555 130,620" fill="#5C4033"/>
    <!-- Head -->
    <circle cx="118" cy="530" r="12" fill="#5C4033"/>
    <!-- Horns -->
    <line x1="110" y1="520" x2="105" y2="505" stroke="#5C4033" stroke-width="2"/>
    <line x1="125" y1="520" x2="130" y2="505" stroke="#5C4033" stroke-width="2"/>
  </g>

  <!-- Elephant -->
  <g opacity="0.28">
    <!-- Body -->
    <ellipse cx="280" cy="680" rx="40" ry="30" fill="#5C4033"/>
    <!-- Head -->
    <circle cx="260" cy="660" r="22" fill="#5C4033"/>
    <!-- Trunk -->
    <path d="M265,680 Q250,700 245,750" stroke="#5C4033" stroke-width="8" fill="none" opacity="0.9"/>
    <!-- Legs -->
    <rect x="245" y="710" width="8" height="50" fill="#5C4033" opacity="0.85"/>
    <rect x="275" y="710" width="8" height="50" fill="#5C4033" opacity="0.85"/>
    <rect x="305" y="710" width="8" height="50" fill="#5C4033" opacity="0.85"/>
  </g>

  <!-- Small animal silhouettes -->
  <g opacity="0.22">
    <!-- Antelope -->
    <ellipse cx="150" cy="750" rx="18" ry="15" fill="#5C4033"/>
    <circle cx="140" cy="740" r="12" fill="#5C4033"/>
    <line x1="135" y1="735" x2="130" y2="720" stroke="#5C4033" stroke-width="1.5"/>
    <line x1="145" y1="735" x2="150" y2="718" stroke="#5C4033" stroke-width="1.5"/>
  </g>

  <!-- Tree branches detail -->
  <path d="M100,380 L70,340 L100,310 L130,340" stroke="#7d6608" stroke-width="1.5" fill="none" opacity="0.15"/>

  <!-- Atmospheric glow -->
  <circle cx="195" cy="350" r="140" fill="#f39c12" opacity="0.08"/>

  <!-- Vignette overlay -->
  <rect width="390" height="844" fill="url(#safariVignette)"/>
</svg>