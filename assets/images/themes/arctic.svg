<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arcticBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7ec8e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5eb3d6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="arcticVignette" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.38" />
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="390" height="844" fill="url(#arcticBg)"/>

  <!-- Deep arctic blue accent areas -->
  <circle cx="100" cy="300" r="100" fill="#22313F" opacity="0.12"/>
  <circle cx="300" cy="500" r="120" fill="#22313F" opacity="0.1"/>

  <!-- Northern lights (Aurora Borealis) streaks -->
  <!-- Green waves -->
  <path d="M0,150 Q97.5,100 195,150 T390,150" stroke="#55efc4" stroke-width="8" fill="none" opacity="0.25"/>
  <path d="M0,180 Q97.5,130 195,180 T390,180" stroke="#55efc4" stroke-width="6" fill="none" opacity="0.2"/>
  <path d="M0,210 Q97.5,160 195,210 T390,210" stroke="#55efc4" stroke-width="5" fill="none" opacity="0.18"/>

  <!-- Purple/blue aurora tints -->
  <path d="M0,120 Q97.5,70 195,120 T390,120" stroke="#a29bfe" stroke-width="7" fill="none" opacity="0.15"/>
  <path d="M0,240 Q97.5,190 195,240 T390,240" stroke="#55efc4" stroke-width="4" fill="none" opacity="0.15"/>

  <!-- Glowing centers of aurora -->
  <circle cx="100" cy="140" r="50" fill="#55efc4" opacity="0.1"/>
  <circle cx="260" cy="160" r="60" fill="#a29bfe" opacity="0.08"/>
  <circle cx="200" cy="200" r="55" fill="#55efc4" opacity="0.09"/>

  <!-- Snowflake patterns - large -->
  <g opacity="0.35">
    <!-- Snowflake 1 -->
    <line x1="60" y1="400" x2="60" y2="450" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="40" y1="415" x2="80" y2="435" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="80" y1="415" x2="40" y2="435" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="55" y1="410" x2="65" y2="440" stroke="#ffffff" stroke-width="1"/>
    <line x1="65" y1="410" x2="55" y2="440" stroke="#ffffff" stroke-width="1"/>
    <line x1="45" y1="420" x2="75" y2="430" stroke="#ffffff" stroke-width="1"/>
    <line x1="75" y1="420" x2="45" y2="430" stroke="#ffffff" stroke-width="1"/>
  </g>

  <g opacity="0.3">
    <!-- Snowflake 2 -->
    <line x1="280" y1="550" x2="280" y2="610" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="250" y1="570" x2="310" y2="590" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="310" y1="570" x2="250" y2="590" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="272" y1="560" x2="288" y2="600" stroke="#ffffff" stroke-width="1"/>
    <line x1="288" y1="560" x2="272" y2="600" stroke="#ffffff" stroke-width="1"/>
    <line x1="260" y1="575" x2="300" y2="585" stroke="#ffffff" stroke-width="1"/>
    <line x1="300" y1="575" x2="260" y2="585" stroke="#ffffff" stroke-width="1"/>
  </g>

  <g opacity="0.28">
    <!-- Snowflake 3 -->
    <line x1="150" y1="700" x2="150" y2="750" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="125" y1="720" x2="175" y2="740" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="175" y1="720" x2="125" y2="740" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="142" y1="710" x2="158" y2="750" stroke="#ffffff" stroke-width="1"/>
    <line x1="158" y1="710" x2="142" y2="750" stroke="#ffffff" stroke-width="1"/>
    <line x1="130" y1="725" x2="170" y2="735" stroke="#ffffff" stroke-width="1"/>
    <line x1="170" y1="725" x2="130" y2="735" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Ice crystal shapes (angular) -->
  <g opacity="0.32">
    <polygon points="320,250 330,240 340,250 330,260" fill="#ffffff" opacity="0.4"/>
    <polygon points="310,260 318,250 326,260 318,270" fill="#ffffff" opacity="0.35"/>
  </g>

  <!-- Icy blue crystal clusters -->
  <g opacity="0.25">
    <rect x="80" y="650" width="4" height="25" fill="#a8d8ea"/>
    <rect x="75" y="660" width="4" height="20" fill="#a8d8ea"/>
    <rect x="85" y="665" width="4" height="18" fill="#a8d8ea"/>
  </g>

  <g opacity="0.22">
    <rect x="320" y="600" width="5" height="30" fill="#a8d8ea"/>
    <rect x="314" y="610" width="5" height="25" fill="#a8d8ea"/>
    <rect x="326" y="615" width="5" height="22" fill="#a8d8ea"/>
  </g>

  <!-- Smaller snowflake particles -->
  <circle cx="120" cy="300" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="250" cy="350" r="1.3" fill="#ffffff" opacity="0.55"/>
  <circle cx="70" cy="500" r="1.4" fill="#ffffff" opacity="0.58"/>
  <circle cx="340" cy="600" r="1.2" fill="#ffffff" opacity="0.52"/>
  <circle cx="180" cy="650" r="1.6" fill="#ffffff" opacity="0.63"/>

  <!-- Icy shimmer overlays -->
  <circle cx="195" cy="400" r="110" fill="#55efc4" opacity="0.05"/>
  <circle cx="100" cy="250" r="90" fill="#a8d8ea" opacity="0.06"/>

  <!-- Vignette overlay -->
  <rect width="390" height="844" fill="url(#arcticVignette)"/>
</svg>