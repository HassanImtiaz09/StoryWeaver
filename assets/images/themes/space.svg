<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="spaceBg" cx="50%" cy="20%">
      <stop offset="0%" style="stop-color:#3d1f5c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0533;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0321;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="spaceVignette" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.4" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="390" height="844" fill="url(#spaceBg)"/>

  <!-- Nebula clouds -->
  <circle cx="80" cy="150" r="120" fill="#2d1b69" opacity="0.3"/>
  <circle cx="150" cy="100" r="100" fill="#4a2a7f" opacity="0.25"/>
  <circle cx="310" cy="200" r="110" fill="#2d1b69" opacity="0.28"/>
  <circle cx="50" cy="600" r="130" fill="#4a2a7f" opacity="0.2"/>

  <!-- Crescent moon -->
  <circle cx="320" cy="120" r="45" fill="#1a0533"/>
  <circle cx="330" cy="110" r="45" fill="url(#spaceBg)"/>

  <!-- Stars with glow -->
  <circle cx="60" cy="80" r="2.5" fill="#FFD700" filter="url(#glow)" opacity="0.9"/>
  <circle cx="120" cy="50" r="2" fill="#FFD700" filter="url(#glow)" opacity="0.85"/>
  <circle cx="200" cy="70" r="1.5" fill="#FFD700" filter="url(#glow)" opacity="0.8"/>
  <circle cx="280" cy="40" r="2.5" fill="#FFD700" filter="url(#glow)" opacity="0.9"/>
  <circle cx="340" cy="90" r="1.8" fill="#FFD700" filter="url(#glow)" opacity="0.87"/>
  <circle cx="45" cy="200" r="2" fill="#FFD700" filter="url(#glow)" opacity="0.85"/>
  <circle cx="350" cy="300" r="1.5" fill="#FFD700" filter="url(#glow)" opacity="0.8"/>
  <circle cx="100" cy="400" r="2.2" fill="#FFD700" filter="url(#glow)" opacity="0.88"/>
  <circle cx="300" cy="500" r="1.8" fill="#FFD700" filter="url(#glow)" opacity="0.87"/>
  <circle cx="70" cy="650" r="2" fill="#FFD700" filter="url(#glow)" opacity="0.85"/>
  <circle cx="250" cy="750" r="2.3" fill="#FFD700" filter="url(#glow)" opacity="0.89"/>
  <circle cx="320" cy="700" r="1.6" fill="#FFD700" filter="url(#glow)" opacity="0.82"/>

  <!-- Planet silhouettes -->
  <circle cx="50" cy="500" r="35" fill="#2d1b69" opacity="0.4"/>
  <circle cx="320" cy="650" r="28" fill="#0d1b2a" opacity="0.35"/>
  <circle cx="150" cy="750" r="32" fill="#2d1b69" opacity="0.38"/>

  <!-- Distant stars (smaller) -->
  <circle cx="175" cy="150" r="1.2" fill="#FFD700" opacity="0.6"/>
  <circle cx="220" cy="300" r="1.1" fill="#FFD700" opacity="0.58"/>
  <circle cx="140" cy="550" r="1.3" fill="#FFD700" opacity="0.65"/>
  <circle cx="280" cy="650" r="1.1" fill="#FFD700" opacity="0.58"/>

  <!-- Nebula glow accent -->
  <circle cx="200" cy="400" r="150" fill="#4a2a7f" opacity="0.15"/>

  <!-- Vignette overlay -->
  <rect width="390" height="844" fill="url(#spaceVignette)"/>
</svg>