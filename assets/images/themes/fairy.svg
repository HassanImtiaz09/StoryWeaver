<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fairySky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c39bd3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="fairyVignette" cx="50%" cy="35%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.35" />
    </radialGradient>
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="390" height="844" fill="url(#fairySky)"/>

  <!-- Soft pink gradient overlay -->
  <rect width="390" height="844" fill="#fd79a8" opacity="0.15"/>

  <!-- Cotton candy clouds -->
  <circle cx="60" cy="100" r="45" fill="#fd79a8" opacity="0.35"/>
  <circle cx="100" cy="90" r="50" fill="#fd79a8" opacity="0.3"/>
  <circle cx="80" cy="130" r="40" fill="#fd79a8" opacity="0.32"/>

  <circle cx="280" cy="150" r="55" fill="#fd79a8" opacity="0.28"/>
  <circle cx="330" cy="140" r="48" fill="#fd79a8" opacity="0.32"/>
  <circle cx="305" cy="190" r="50" fill="#fd79a8" opacity="0.3"/>

  <!-- Rainbow arcs -->
  <path d="M100,300 Q195,150 290,300" stroke="#ff6b9d" stroke-width="8" fill="none" opacity="0.2"/>
  <path d="M110,320 Q195,170 280,320" stroke="#f06292" stroke-width="7" fill="none" opacity="0.18"/>
  <path d="M120,340 Q195,190 270,340" stroke="#ff69b4" stroke-width="6" fill="none" opacity="0.16"/>

  <!-- Castle turrets silhouettes -->
  <g opacity="0.25">
    <!-- Left tower -->
    <rect x="50" y="500" width="30" height="200" fill="#8e44ad"/>
    <polygon points="50,500 55,480 60,500" fill="#8e44ad"/>
    <polygon points="80,500 85,475 90,500" fill="#8e44ad"/>
    <!-- Right tower -->
    <rect x="85" y="520" width="25" height="180" fill="#8e44ad"/>
    <polygon points="85,520 88,498 92,520" fill="#8e44ad"/>
    <polygon points="110,520 113,495 117,520" fill="#8e44ad"/>
  </g>

  <g opacity="0.22">
    <!-- Right castle -->
    <rect x="280" y="550" width="35" height="180" fill="#8e44ad"/>
    <polygon points="280,550 285,525 290,550" fill="#8e44ad"/>
    <polygon points="315,550 320,520 325,550" fill="#8e44ad"/>
    <!-- Adjacent tower -->
    <rect x="318" y="570" width="28" height="160" fill="#8e44ad"/>
    <polygon points="318,570 322,545 327,570" fill="#8e44ad"/>
    <polygon points="346,570 350,542 355,570" fill="#8e44ad"/>
  </g>

  <!-- Flower blooms -->
  <g opacity="0.35">
    <!-- Rose cluster -->
    <circle cx="70" cy="600" r="15" fill="#e91e63"/>
    <circle cx="55" cy="590" r="12" fill="#e91e63"/>
    <circle cx="85" cy="590" r="12" fill="#e91e63"/>
    <circle cx="70" cy="620" r="12" fill="#e91e63"/>
  </g>

  <g opacity="0.3">
    <!-- Sunflower -->
    <circle cx="300" cy="650" r="18" fill="#f1c40f"/>
    <circle cx="310" cy="635" r="10" fill="#f1c40f"/>
    <circle cx="320" cy="645" r="10" fill="#f1c40f"/>
    <circle cx="310" cy="665" r="10" fill="#f1c40f"/>
    <circle cx="290" cy="655" r="10" fill="#f1c40f"/>
  </g>

  <!-- Butterfly silhouettes -->
  <g opacity="0.28">
    <circle cx="150" cy="400" r="6" fill="#ff69b4"/>
    <circle cx="140" cy="390" r="8" fill="#ff69b4"/>
    <circle cx="160" cy="390" r="8" fill="#ff69b4"/>
    <line x1="150" y1="395" x2="150" y2="415" stroke="#ff69b4" stroke-width="1.5"/>
  </g>

  <g opacity="0.24">
    <circle cx="250" cy="480" r="5" fill="#ff69b4"/>
    <circle cx="242" cy="472" r="7" fill="#ff69b4"/>
    <circle cx="258" cy="472" r="7" fill="#ff69b4"/>
    <line x1="250" y1="476" x2="250" y2="495" stroke="#ff69b4" stroke-width="1.5"/>
  </g>

  <!-- Floating sparkles -->
  <circle cx="140" cy="250" r="2.5" fill="#FFD700" filter="url(#sparkle)" opacity="0.8"/>
  <circle cx="210" cy="200" r="2" fill="#FFD700" filter="url(#sparkle)" opacity="0.75"/>
  <circle cx="280" cy="280" r="2.2" fill="#FFD700" filter="url(#sparkle)" opacity="0.78"/>
  <circle cx="100" cy="450" r="1.8" fill="#FFD700" filter="url(#sparkle)" opacity="0.7"/>
  <circle cx="320" cy="400" r="2.1" fill="#FFD700" filter="url(#sparkle)" opacity="0.8"/>
  <circle cx="170" cy="550" r="1.9" fill="#FFD700" filter="url(#sparkle)" opacity="0.75"/>
  <circle cx="70" cy="700" r="2" fill="#FFD700" filter="url(#sparkle)" opacity="0.77"/>
  <circle cx="290" cy="750" r="1.8" fill="#FFD700" filter="url(#sparkle)" opacity="0.72"/>

  <!-- Fairy dust / magical particles (smaller) -->
  <circle cx="120" cy="350" r="1.2" fill="#f1c40f" opacity="0.6"/>
  <circle cx="260" cy="320" r="1.1" fill="#f1c40f" opacity="0.55"/>
  <circle cx="180" cy="550" r="1.3" fill="#f1c40f" opacity="0.65"/>
  <circle cx="340" cy="600" r="1.1" fill="#f1c40f" opacity="0.58"/>

  <!-- Soft glow center -->
  <circle cx="195" cy="400" r="100" fill="#fd79a8" opacity="0.08"/>

  <!-- Vignette overlay -->
  <rect width="390" height="844" fill="url(#fairyVignette)"/>
</svg>