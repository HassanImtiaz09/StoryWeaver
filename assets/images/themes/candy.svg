<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="candySky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdcb6e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8fab;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e84393;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="candyVignette" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.3" />
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="390" height="844" fill="url(#candySky)"/>

  <!-- Cotton candy clouds -->
  <circle cx="50" cy="120" r="45" fill="#ff8fab" opacity="0.4"/>
  <circle cx="90" cy="110" r="50" fill="#ff8fab" opacity="0.35"/>
  <circle cx="70" cy="150" r="40" fill="#ff8fab" opacity="0.38"/>

  <circle cx="260" cy="180" r="55" fill="#00cec9" opacity="0.32"/>
  <circle cx="320" cy="165" r="50" fill="#00cec9" opacity="0.35"/>
  <circle cx="290" cy="220" r="50" fill="#00cec9" opacity="0.3"/>

  <!-- Candy cane stripe pattern (left edge) -->
  <g opacity="0.25">
    <rect x="0" y="0" width="15" height="150" fill="#e84393"/>
    <rect x="0" y="150" width="15" height="150" fill="#ffffff"/>
    <rect x="0" y="300" width="15" height="150" fill="#e84393"/>
    <rect x="0" y="450" width="15" height="150" fill="#ffffff"/>
    <rect x="0" y="600" width="15" height="150" fill="#e84393"/>
    <rect x="0" y="750" width="15" height="94" fill="#ffffff"/>
  </g>

  <!-- Candy cane stripe pattern (right edge) -->
  <g opacity="0.23">
    <rect x="375" y="50" width="15" height="140" fill="#fdcb6e"/>
    <rect x="375" y="190" width="15" height="140" fill="#ffffff"/>
    <rect x="375" y="330" width="15" height="140" fill="#fdcb6e"/>
    <rect x="375" y="470" width="15" height="140" fill="#ffffff"/>
    <rect x="375" y="610" width="15" height="140" fill="#fdcb6e"/>
    <rect x="375" y="750" width="15" height="94" fill="#ffffff"/>
  </g>

  <!-- Lollipop swirls -->
  <!-- Lollipop 1 (left) -->
  <g opacity="0.3">
    <circle cx="80" cy="400" r="35" fill="none" stroke="#6c5ce7" stroke-width="6"/>
    <circle cx="80" cy="400" r="30" fill="none" stroke="#fdcb6e" stroke-width="5"/>
    <circle cx="80" cy="400" r="22" fill="none" stroke="#6c5ce7" stroke-width="4"/>
    <rect x="75" y="430" width="10" height="50" fill="#8B4513"/>
  </g>

  <!-- Lollipop 2 (center) -->
  <g opacity="0.28">
    <circle cx="260" cy="480" r="40" fill="none" stroke="#e84393" stroke-width="7"/>
    <circle cx="260" cy="480" r="33" fill="none" stroke="#00cec9" stroke-width="6"/>
    <circle cx="260" cy="480" r="24" fill="none" stroke="#e84393" stroke-width="5"/>
    <rect x="254" y="520" width="12" height="60" fill="#654321"/>
  </g>

  <!-- Lollipop 3 (right) -->
  <g opacity="0.26">
    <circle cx="320" cy="350" r="32" fill="none" stroke="#fdcb6e" stroke-width="5.5"/>
    <circle cx="320" cy="350" r="26" fill="none" stroke="#ff8fab" stroke-width="4.5"/>
    <circle cx="320" cy="350" r="18" fill="none" stroke="#fdcb6e" stroke-width="3.5"/>
    <rect x="316" y="380" width="8" height="45" fill="#8B4513"/>
  </g>

  <!-- Sprinkles pattern -->
  <g opacity="0.35">
    <!-- Rainbow sprinkles -->
    <rect x="50" y="550" width="3" height="20" fill="#6c5ce7" transform="rotate(-30 51.5 560)"/>
    <rect x="75" y="545" width="3" height="22" fill="#e84393" transform="rotate(-15 76.5 556)"/>
    <rect x="100" y="548" width="3" height="18" fill="#00cec9" transform="rotate(10 101.5 557)"/>
    <rect x="125" y="555" width="3" height="20" fill="#fdcb6e" transform="rotate(25 126.5 565)"/>
    <rect x="150" y="560" width="3" height="19" fill="#ff8fab" transform="rotate(40 151.5 569.5)"/>
  </g>

  <g opacity="0.32">
    <!-- More sprinkles -->
    <rect x="250" y="650" width="3" height="20" fill="#6c5ce7" transform="rotate(-35 251.5 660)"/>
    <rect x="275" y="645" width="3" height="22" fill="#e84393" transform="rotate(-20 276.5 656)"/>
    <rect x="300" y="648" width="3" height="18" fill="#00cec9" transform="rotate(5 301.5 657)"/>
    <rect x="325" y="655" width="3" height="20" fill="#fdcb6e" transform="rotate(30 326.5 665)"/>
  </g>

  <!-- Gumball silhouettes -->
  <circle cx="150" cy="300" r="15" fill="#e84393" opacity="0.25"/>
  <circle cx="320" cy="600" r="12" fill="#00cec9" opacity="0.22"/>
  <circle cx="70" cy="680" r="14" fill="#6c5ce7" opacity="0.24"/>

  <!-- Candy dot pattern -->
  <circle cx="100" cy="200" r="4" fill="#6c5ce7" opacity="0.25"/>
  <circle cx="150" cy="600" r="3.5" fill="#00cec9" opacity="0.22"/>
  <circle cx="270" cy="250" r="4.2" fill="#e84393" opacity="0.26"/>
  <circle cx="320" cy="700" r="3.8" fill="#fdcb6e" opacity="0.23"/>
  <circle cx="200" cy="750" r="4" fill="#ff8fab" opacity="0.24"/>

  <!-- Pastel glow circles -->
  <circle cx="195" cy="400" r="100" fill="#e84393" opacity="0.06"/>
  <circle cx="100" cy="500" r="90" fill="#00cec9" opacity="0.05"/>

  <!-- Vignette overlay -->
  <rect width="390" height="844" fill="url(#candyVignette)"/>
</svg>