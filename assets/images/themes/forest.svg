<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="forestBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0b3d0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#051a05;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="forestVignette" cx="50%" cy="35%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.45" />
    </radialGradient>
    <filter id="firefly">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="390" height="844" fill="url(#forestBg)"/>

  <!-- Mist layers -->
  <circle cx="195" cy="200" r="200" fill="#2ecc71" opacity="0.12"/>
  <circle cx="100" cy="400" r="180" fill="#2ecc71" opacity="0.1"/>
  <circle cx="300" cy="600" r="190" fill="#2ecc71" opacity="0.11"/>

  <!-- Tree silhouettes - background layer -->
  <polygon points="30,400 60,200 90,400" fill="#051a05" opacity="0.35"/>
  <polygon points="320,450 360,180 390,450" fill="#051a05" opacity="0.38"/>
  <polygon points="150,500 190,250 230,500" fill="#051a05" opacity="0.33"/>

  <!-- Tree silhouettes - middle layer -->
  <polygon points="0,550 50,300 100,550" fill="#0b3d0b" opacity="0.4"/>
  <polygon points="280,600 340,320 390,600" fill="#0b3d0b" opacity="0.42"/>
  <polygon points="100,650 160,400 220,650" fill="#0b3d0b" opacity="0.38"/>

  <!-- Tree silhouettes - foreground -->
  <polygon points="80,750 140,450 200,750" fill="#1a4d2e" opacity="0.5"/>
  <polygon points="200,800 280,500 360,800" fill="#1a4d2e" opacity="0.48"/>

  <!-- Mushrooms -->
  <g opacity="0.35">
    <rect x="60" y="650" width="8" height="25" fill="#8B4513"/>
    <circle cx="64" cy="650" r="18" fill="#e74c3c"/>
  </g>
  <g opacity="0.3">
    <rect x="280" y="700" width="6" height="20" fill="#8B4513"/>
    <circle cx="283" cy="700" r="15" fill="#e74c3c"/>
  </g>

  <!-- Fireflies - glowing particles -->
  <circle cx="120" cy="280" r="2" fill="#FFD700" filter="url(#firefly)" opacity="0.8"/>
  <circle cx="200" cy="320" r="2.2" fill="#FFD700" filter="url(#firefly)" opacity="0.75"/>
  <circle cx="280" cy="250" r="1.8" fill="#FFD700" filter="url(#firefly)" opacity="0.7"/>
  <circle cx="60" cy="400" r="2" fill="#FFD700" filter="url(#firefly)" opacity="0.78"/>
  <circle cx="320" cy="350" r="1.9" fill="#FFD700" filter="url(#firefly)" opacity="0.72"/>
  <circle cx="150" cy="450" r="2.1" fill="#FFD700" filter="url(#firefly)" opacity="0.8"/>
  <circle cx="300" cy="500" r="1.7" fill="#FFD700" filter="url(#firefly)" opacity="0.68"/>
  <circle cx="80" cy="550" r="2" fill="#FFD700" filter="url(#firefly)" opacity="0.76"/>
  <circle cx="250" cy="600" r="1.8" fill="#FFD700" filter="url(#firefly)" opacity="0.71"/>
  <circle cx="140" cy="650" r="2.2" fill="#FFD700" filter="url(#firefly)" opacity="0.82"/>

  <!-- Smaller magical sparkles -->
  <circle cx="100" cy="200" r="1.2" fill="#2ecc71" opacity="0.5"/>
  <circle cx="280" cy="180" r="1.1" fill="#2ecc71" opacity="0.45"/>
  <circle cx="180" cy="350" r="1.3" fill="#2ecc71" opacity="0.55"/>
  <circle cx="320" cy="450" r="1.1" fill="#2ecc71" opacity="0.48"/>

  <!-- Foggy glow center -->
  <circle cx="195" cy="350" r="120" fill="#2ecc71" opacity="0.08"/>

  <!-- Vignette overlay -->
  <rect width="390" height="844" fill="url(#forestVignette)"/>
</svg>